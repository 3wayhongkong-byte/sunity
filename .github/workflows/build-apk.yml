name: Build Android APK

on:
  push:
    branches: [ "douyin-autoliker" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/app-release-unsigned.apk DouyinAutoLiker.apk 2>/dev/null || \
          cp app/build/outputs/apk/debug/app-debug.apk DouyinAutoLiker.apk 2>/dev/null || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DouyinAutoLiker-APK
          path: DouyinAutoLiker.apk