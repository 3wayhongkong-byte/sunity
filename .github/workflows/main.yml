name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Create google-services.json (fallback if missing)
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
            echo "✅ Using secret GOOGLE_SERVICES_JSON"
          elif [ ! -f app/google-services.json ]; then
            python3 -c 'import json; json.dump({"project_info":{"project_number":"100538114118","project_id":"sunity-ad133","storage_bucket":"sunity-ad133.firebasestorage.app"},"client":[{"client_info":{"mobilesdk_app_id":"1:100538114118:android:11e990ceb7d6ce5823aa47","android_client_info":{"package_name":"com.propertymanager"}},"api_key":[{"current_key":"AIzaSyBYCvLctI85suepN7xWuXl1ae47DCjMqe8"}]}],"configuration_version":"1"}, open("app/google-services.json","w"), indent=2)'
            echo "✅ Created fallback google-services.json"
          else
            echo "✅ google-services.json already exists from repo"
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk