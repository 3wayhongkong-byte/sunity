name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Create google-services.json
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
          else
            cat > app/google-services.json << 'EOF'
            {
              "project_info": {
                "project_number": "0",
                "project_id": "placeholder",
                "storage_bucket": "placeholder.appspot.com"
              },
              "client": [{
                "client_info": {
                  "mobilesdk_app_id": "1:0:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "com.propertymanager"
                  }
                },
                "api_key": [{
                  "current_key": "placeholder"
                }]
              }],
              "configuration_version": "1"
            }
            EOF
          fi
          echo "google-services.json created"

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk